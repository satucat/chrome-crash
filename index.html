        body {

            align-items: center;

            min-height: 100vh;
            margin: 0;
            padding: 20px;

        }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            width: 20px;
            height: auto;
            z-index: 9999;
        }

        #star-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            color: #16c5fa;
            font-family: monospace;
            user-select: none;
            animation: blink step-end forwards;
        }

        @keyframes blink {

            0%,
            40%,
            80% {
                opacity: 1;
            }

            20%,
            60%,
            100% {
                opacity: 0;
            }
        }

        .header-container {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            width: 100%;
            max-width: 600px;
            margin: 20px 0 5px 0;
        }

        h1 {
            font-weight: normal;
            font-size: 3rem;
            margin: 0;
            letter-spacing: 4px;
            text-align: left;
        }

        .header-image {
            width: 90px;
            height: auto;
            pointer-events: none;
        }

        hr {
            border: 0;
            border-top: 3px solid #555;
            width: 100%;
            max-width: 600px;
            margin: 0 0 20px 0;
        }

        p {
            font-size: 1.2rem;
            width: 100%;
            max-width: 600px;
            line-height: 1.6;
            margin: 0;
            opacity: 0.85;
            font-family: 'Willow', sans-serif;
            text-align: left;
        }

        .socials {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
            max-width: 600px;
            justify-content: flex-start;
        }

        .social-link {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px;
            text-decoration: none;
            color: #f0f0f0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            cursor: none;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .social-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .social-link:hover .social-icon {
            transform: rotate(360deg) scale(1.1);
            background: #16c5fa;
            color: #121212;
        }

        .social-username {
            max-width: 0;
            opacity: 0;
            white-space: nowrap;
            transition: all 0.4s ease;
            font-size: 1rem;
            margin-left: 0;
        }

        .social-link:hover .social-username {
            max-width: 180px;
            opacity: 1;
            margin-left: 10px;
            margin-right: 10px;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #16c5fa;
            box-shadow: 0 4px 15px rgba(22, 197, 250, 0.2);
        }
    </style>

    <script>
        const container = document.getElementById('star-container');
        const chars = ['*', '+', '.', 'x', '✧', '★'];

        function spawnStar() {
            if (!container) return;

            let star = document.createElement('span');
            star.className = 'star';
            star.textContent = chars[Math.floor(Math.random() * chars.length)];

            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.fontSize = (Math.random() * 1.5 + 0.5) + 'rem';

            let time = Math.random() * 4 + 3;
            star.style.animationDuration = time + 's';

            container.appendChild(star);
            setTimeout(() => star.remove(), time * 1000);
        }

        for (let i = 0; i < 150; i++) {
            setTimeout(spawnStar, Math.random() * 4000);
        }

        setInterval(spawnStar, 100);

        const customCursor = document.getElementById('custom-cursor');
        document.addEventListener('mousemove', (e) => {
            customCursor.style.left = e.clientX + 'px';
            customCursor.style.top = e.clientY + 'px';
        });
    </script>
    <script src="https://unpkg.com/cursor-effects@latest/dist/browser.js"></script>
    <script>
        window.addEventListener("load", () => {
            const cursor = new cursoreffects.snowflakeCursor();
        });

        // --- Audio Button Logic ---
        const pressAudio = new Audio('press.mp3');
        const releaseAudio = new Audio('release.mp3');

        // Preload the audio to avoid delay
        pressAudio.preload = 'auto';
        releaseAudio.preload = 'auto';

        document.querySelectorAll('.social-link').forEach(button => {
            let mouseDownTime = 0;
            
            button.addEventListener('mousedown', () => {
                mouseDownTime = Date.now();
                // Reset time to allow rapid overlapping clicks
                pressAudio.currentTime = 0;
                pressAudio.play().catch(e => console.log('Audio error:', e));
            });

            button.addEventListener('mouseup', () => {
                if (!mouseDownTime) return;
                const timeElapsed = Date.now() - mouseDownTime;
                const delay = Math.max(0, 40 - timeElapsed);
                
                setTimeout(() => {
                    releaseAudio.currentTime = 0;
                    releaseAudio.play().catch(e => console.log('Audio error:', e));
                }, delay);
                mouseDownTime = 0;
            });

            button.addEventListener('mouseleave', () => {
                if (mouseDownTime > 0) {
                    const timeElapsed = Date.now() - mouseDownTime;
                    const delay = Math.max(0, 40 - timeElapsed);
                    setTimeout(() => {
                        releaseAudio.currentTime = 0;
                        releaseAudio.play().catch(e => console.log('Audio error:', e));
                    }, delay);
                    mouseDownTime = 0;
                }
            });
        });
    </script>
